<div id="engine-container">
    <header id="topbar" class="neon-glow">🟣 Purple Engine V1.5 | Project: Purple-3D-Studio</header>
    
    <div id="main-workspace">
        <aside id="explorer" class="floating-panel">
            <div class="panel-tabs">
                <button class="tab-btn active" onclick="switchTab('hierarchy')">Explorer</button>
                <button class="tab-btn" onclick="switchTab('project')">Project</button>
            </div>
            <div id="hierarchy-content">
                <div class="panel-title">Hiyerarşi <button id="add-btn">+</button></div>
                <ul id="scene-graph"></ul>
            </div>
        </aside>

        <section id="center-viewport">
            <div id="tools-panel">
                <button id="btn-translate">Sürükle</button>
                <button id="btn-rotate">Döndür</button>
                <button id="btn-scale">Ölçek</button>
                <button id="btn-delete" style="color: #ff4444;">Sil (Del)</button>
            </div>
            <div id="viewport-container"></div>
            
            <div id="bottom-panel" class="floating-panel">
                <div class="panel-tabs">
                    <button class="tab-btn active">Console</button>
                    <button class="tab-btn">Animation Timeline</button>
                </div>
                <div id="console-output">> Purple Engine Initialized...</div>
            </div>
        </section>

        <aside id="inspector" class="floating-panel">
            <div class="panel-title">Inspector</div>
            <div id="inspector-content">
                <label>Transform</label>
                <div class="prop-row">X: <input id="pos-x" type="number" step="0.1"></div>
                </div>
        </aside>
    </div>
</div>
