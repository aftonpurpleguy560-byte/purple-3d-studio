<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Purple Engine V1.5 | Purple-3D-Studio</title>
    <link rel="stylesheet" href="style.css">
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="engine-container">
        <header id="topbar" class="neon-glow">🟣 Purple Engine - V1.5</header>
        
        <div id="main-workspace">
            <aside id="explorer" class="floating-panel">
                <div class="panel-tabs">
                    <button class="tab-btn active" id="tab-hierarchy">Explorer</button>
                    <button class="tab-btn" id="tab-project">Project</button>
                </div>
                
                <div id="hierarchy-content">
                    <div class="panel-title">
                        <span id="label-hierarchy">Hiyerarşi</span>
                        <button id="add-btn" title="Obje Ekle">+</button>
                    </div>
                    <div id="add-menu" style="display: none; padding: 10px; background: #111; border-bottom: 1px solid #333;">
                        <select id="obj-type">
                            <option value="box">Küp</option>
                            <option value="sphere">Küre</option>
                            <option value="torus">Halka</option>
                            <option value="sprite">Sprite (2D)</option>
                            <option value="neon">Neon Işık</option>
                        </select>
                        <button id="confirm-add">Ekle</button>
                    </div>
                    <ul id="scene-graph"></ul>
                </div>

                <div id="project-content" style="display: none; padding: 15px;">
                    <div class="asset-grid">
                        <div class="asset-item">📁 Models</div>
                        <div class="asset-item">📁 Textures</div>
                    </div>
                </div>
            </aside>

            <section id="center-viewport">
                <div id="tools-panel">
                    <button id="btn-save" class="tool-btn" style="border: 1px solid #00ff41; color: #00ff41;">KAYDET 💾</button>
                    <div class="divider"></div>
                    <button id="btn-translate" class="tool-btn active">Sürükle</button>
                    <button id="btn-rotate" class="tool-btn">Döndür</button>
                    <button id="btn-scale" class="tool-btn">Ölçek</button>
                    <div class="divider"></div>
                    <button id="btn-delete" class="tool-btn danger">Sil</button>
                </div>
                
                <div id="viewport-container"></div>
                
                <div id="bottom-panel" class="floating-panel">
                    <div class="panel-tabs">
                        <button class="tab-btn active" id="tab-console">Console</button>
                        <button class="tab-btn" id="tab-anim">Animation</button>
                    </div>
                    <div id="console-output" class="terminal-font"></div>
                </div>
            </section>

            <aside id="inspector" class="floating-panel">
                <div class="panel-title" id="label-inspector">Inspector</div>
                <div id="inspector-content">
                    <div class="prop-group">
                        <label>Transform</label>
                        <div class="prop-row"><span>X:</span><input type="number" id="pos-x" step="0.1" value="0"></div>
                        <div class="prop-row"><span>Y:</span><input type="number" id="pos-y" step="0.1" value="0"></div>
                        <div class="prop-row"><span>Z:</span><input type="number" id="pos-z" step="0.1" value="0"></div>
                    </div>
                </div>
            </aside>
        </div>
        
        <footer id="statusbar">
            🟢 Sistem Hazır | Sakarya Studio Online
        </footer>
    </div>

    <script type="module" src="main.js"></script>

    <script>
        // Tab geçiş mantığı
        const tabHier = document.getElementById('tab-hierarchy');
        const tabProj = document.getElementById('tab-project');
        const contHier = document.getElementById('hierarchy-content');
        const contProj = document.getElementById('project-content');

        tabHier.onclick = () => {
            tabHier.classList.add('active');
            tabProj.classList.remove('active');
            contHier.style.display = 'block';
            contProj.style.display = 'none';
        };

        tabProj.onclick = () => {
            tabProj.classList.add('active');
            tabHier.classList.remove('active');
            contProj.style.display = 'block';
            contHier.style.display = 'none';
        };
    </script>
</body>
</html>
