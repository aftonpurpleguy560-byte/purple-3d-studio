<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Purple Engine 2026</title>
    <link rel="stylesheet" href="style.css">
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="engine-container">
        <header id="topbar">🟣 Purple Engine - V1.0</header>
        
        <div id="main-workspace">
            
            <aside id="hierarchy">
                <div class="panel-title">Hiyerarşi</div>
                <ul id="scene-graph">
                    <li class="active">P_Core_Neon</li>
                    <li>Directional Light</li>
                    <li>Grid_Ground</li>
                </ul>
            </aside>
            
            <main id="viewport-container">
                </main>
            
            <aside id="inspector">
                <div class="panel-title">Özellikler (P_Core)</div>
                <div class="prop-group">
                    <label>Transform</label>
                    <div class="prop-row"><span>X:</span><input type="text" value="0"></div>
                    <div class="prop-row"><span>Y:</span><input type="text" value="2"></div>
                    <div class="prop-row"><span>Z:</span><input type="text" value="0"></div>
                </div>
                <div class="prop-group">
                    <label>PBR Material</label>
                    <div class="color-box"></div>
                </div>
            </aside>
            
        </div>
        
        <footer id="statusbar">Aga Sistem Devrede | Render: Yüksek Kalite PBR | Sakarya Lokasyonu Online</footer>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
