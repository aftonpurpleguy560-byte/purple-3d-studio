<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Purple 3D Studio</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#bc13fe">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="stylesheet" href="style.css">

    <style>
        /* CSS dosyan henüz yüklenmediyse ekranın siyah kalması için kısa bir önlem */
        body { 
            margin: 0; 
            background-color: #050505; 
            overflow: hidden; 
            touch-action: none; /* Tablette kaydırmayı engellemek için */
        }
    </style>
</head>
<body>

    <div id="ui">
        <h1>Purple 3D Studio</h1>
        <p>Aga Motor Çalışıyor 🚀</p>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW Kayıtlı!', reg))
                    .catch(err => console.log('SW Hatası:', err));
            });
        }
    </script>

    <script type="module" src="./main.js"></script>

</body>
</html>
